server {
    listen ${HOST}:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 600m;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源长缓存（Vite 生成的带 hash 文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 运行时配置随容器环境变化，禁止浏览器、代理与 Service Worker 复用旧值。
    location = /runtime-config.json {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # BEGIN RESTRICTED AGENT
    # 受限 Agent 的唯一服务端调用入口。保留 /agent-api/ 前缀剥离语义：
    # /agent-api/v1/... -> Gateway /v1/...
    location ^~ /agent-api/ {
        limit_except GET HEAD POST {
            deny all;
        }

        # Gateway 默认限制上传文件总量为 128 MiB；额外 1 MiB 仅用于 multipart 边界和字段开销。
        client_max_body_size 129m;
        proxy_pass http://agent-gateway:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        # 外层代理提供 X-Forwarded-Host 时原样保留；缺失时 Gateway 会回退到 Host。
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Dokploy 等外层 TLS 终止代理已写入公开协议；不得用容器内 http 的 $scheme 覆盖。
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout ${AGENT_REQUEST_TIMEOUT_SECONDS}s;
        proxy_read_timeout ${AGENT_REQUEST_TIMEOUT_SECONDS}s;

        # 上传流式转发；SSE 状态流不允许缓存或聚合。
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering "no" always;
    }
    # END RESTRICTED AGENT

    # BEGIN API PROXY
    # API 代理。前端请求同源 /api-proxy/...，由 Nginx 转发到部署时配置的 API_PROXY_URL。
    location /api-proxy/ {
        error_log ${API_PROXY_ERROR_LOG_PATH} ${API_PROXY_ERROR_LOG_LEVEL};

        limit_except POST OPTIONS {
            deny all;
        }

        set $allow_proxy 0;
        if ($uri ~* ${SERVER_API_ALLOWED_PATHS}) {
            set $allow_proxy 1;
        }
        if ($allow_proxy = 0) {
            return 403 "Forbidden: API Proxy path restricted";
        }

        proxy_pass ${API_PROXY_URL}/;
        proxy_http_version 1.1;
        proxy_ssl_server_name ${API_PROXY_SSL_SERVER_NAME};
        proxy_ssl_verify ${API_PROXY_SSL_VERIFY};
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_verify_depth 5;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 旧模式显式转发浏览器 Authorization；统一模式由启动脚本替换为服务端 Bearer Key。
        proxy_set_header Authorization "${API_PROXY_AUTHORIZATION}";
        proxy_connect_timeout ${API_PROXY_CONNECT_TIMEOUT_SECONDS}s;
        proxy_send_timeout ${API_PROXY_TIMEOUT_SECONDS}s;
        proxy_read_timeout ${API_PROXY_TIMEOUT_SECONDS}s;
        proxy_request_buffering off;
    }
    # END API PROXY

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
